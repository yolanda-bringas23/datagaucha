<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <title>Perfil</title>
</head>
<body class="profile-page">
    <header class="profile-nav">
        <button class="menu-button">menú-despegable</button>
        <form action="" class="searching-profile">
            <input type="text" placeholder="Búsqueda">
        </form>
        <button>
            <img src="../img/avatar.jpg" alt="Perfil" width="30" height="30">
        </button>
    </header>
    <nav class="nav-profile">
        <ul>
            <li><button class="boton-inicio">Inicio</button></li>
            <li><button class= "boton-create">Create</button></li>
            <li><button class="boton-profile">Profile</button></li>
            <li><button class="boton-exit">Exit</button></li>
            <li>© DohCode - 2026</li>
        </ul>
    </nav>
    
    <main class="main-profile">
        <section class="profile">
            
            <img class="profile-avatar" src="../img/avatar.jpg" alt="Foto de perfil" width="100" height="100">

            <h1>Nombre de usuario</h1>
            
            <button type="button" data-toggle="modal" data-target="#modalSeguidores">80 Seguidores</button>
            <button type="button" data-toggle="modal" data-target="#modalSeguidos">80 Siguiendo</button>

            <h2>Mis Publicaciones</h2>
            
            <div>Publicación 1</div>
            <div>Publicación 2</div>
            <div>Publicación 3</div>

        </section>
    </main>

    
    <div class="modal fade" id="modalSeguidores" tabindex="-1" role="dialog" aria-labelledby="modalSeguidoresLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalSeguidoresLabel">Seguidores</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="followers">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <button class="btn btn-sm btn-secondary">Profile</button>
                            <p class="mb-0">Nombre Usuario</p>
                            <p class="mb-0">Nombre completo</p>
                            <button class="btn btn-sm btn-danger">Quitar Seguidor</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade" id="modalSeguidos" tabindex="-1" role="dialog" aria-labelledby="modalSeguidosLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <p class="modal-title" id="modalSeguidosLabel">Siguiendo</p>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="followers">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <button class="btn btn-sm btn-secondary">Profile</button>
                            <p class="mb-0">Nombre Usuario</p>
                            <p class="mb-0">Nombre completo</p>
                            <button class="btn btn-sm btn-danger">Dejar de seguir</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
