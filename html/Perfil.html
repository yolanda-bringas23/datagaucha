<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <title>Perfil</title>
</head>
<body>
    <div class="grid">
        <nav id="nav">
            <button class="btn-menu" type="button">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="busqueda.html">Busqueda</a></li>
                    <li><a href="comments.html">Comentarios</a></li>
                    <li><a href="conditions-of-use.html">Condiciones de Uso</a></li>
                    <li><a href="registro.html">Registro</a></li>
                    <li><a href="LOGIN.html">Cerrar Sesión</a></li>
            </ul>
            </ul>
        </nav>

        <header id="header">
            <form class="search-form" action="">
                <div class="input-group">
                    <button class="btn-submit" type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" class="form-control" placeholder="Buscar...">
                    <button class="btn-reset" type="reset">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </form>
        </header>

        <section id="section">
            <div class="profile">
                <div class="profile-top-section">
                    <img class="profile-avatar" src="../img/avatar.jpg" alt="Foto de perfil" width="100" height="100">

                    <div class="info-profile">
                        <h1>Nombre de usuario</h1>

                        <div class="profile-counters">
                            <button type="button" data-bs-toggle="modal" data-bs-target="#modalSeguidores">80 Seguidores</button>
                            <button type="button" data-bs-toggle="modal" data-bs-target="#modalSeguidos">80 Siguiendo</button>
                        </div>
                    </div>
                </div>

                <h2>Mis Publicaciones</h2>

                <div class="profile-post">
                    <div>Publicación 1</div>
                    <div>Publicación 2</div>
                    <div>Publicación 3</div>
                </div>
            </div>
        </section>

        <footer id="footer">
            <p class="p-index">© DohCode 2026</p>
        </footer>
    </div>

    <div class="modal fade" id="modalSeguidores" tabindex="-1" aria-labelledby="modalSeguidoresLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title" id="modalSeguidoresLabel">Seguidores</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div class="followers">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <button class="btn btn-sm btn-secondary" type="button">
                                <i class="fa-solid fa-circle-user user-btn"></i>
                            </button>
                            <p class="mb-0">Nombre Usuario</p>
                            <p class="mb-0">Nombre completo</p>
                            <button class="btn btn-sm btn-danger">Quitar Seguidor</button>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalSeguidos" tabindex="-1" aria-labelledby="modalSeguidosLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <p class="modal-title" id="modalSeguidosLabel">Siguiendo</p>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div class="followers">
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <button class="btn btn-sm btn-secondary" type="button">
                                <i class="fa-solid fa-circle-user user-btn"></i>
                            </button>
                            <p class="mb-0">Nombre Usuario</p>
                            <p class="mb-0">Nombre completo</p>
                            <button class="btn btn-sm btn-danger">Dejar de seguir</button>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
