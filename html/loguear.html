<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Esta es una red social de Licencia MIT hecha por estudiantes
    de la tecnicatura de desarrollo de software en Córdoba, Argentina, aqui puedes compartir, crear debates
    y conectar con cualquier persona">
    <meta name="keywords" content="Red social, ITSC, comunidad, noticias, Argentina, codigo abierto, crear cuenta, comenzar">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <title>DataGaucha - Iniciar sesión</title>
</head>
<body>
    <main class="container-login">
        <section class="container-login2">
            <img class="image" src="../img/DataGaucha.jpg" alt="">
        </section>

        <div class="main-login">
            <section class="login-section">
                <div class="text-login">
                    <h1>Iniciar Sesión en Data Gaucha</h1>
                </div>

                <form action="" method="post" class="login-form">
                    <input type="text" id="usuario" name="usuario" required placeholder="Nombre de usuario o correo">

                    <input type="password" id="password" name="password" required placeholder="Contraseña">

                    <button type="submit">Iniciar sesión</button>

                    <p class="register-link">
                        ¿No tienes cuenta?
                        <a href="registro.html">Registrate</a>
                    </p>

                    <p class="DohCode">© DohCode 2026</p>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
