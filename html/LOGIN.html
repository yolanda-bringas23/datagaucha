<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="logo-container">
                <img src="img/DataGaucha.jpg" alt="Data Gaucha" class="logo">

                <div class="brand">
                    <span class="data">Data</span>
                    <span class="gaucha">Gaucha</span>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <h2>Iniciar sesión en DataGaucha</h2>
            
            <form class="login-form">
                <input type="text" class="input-field" placeholder="Nombre de usuario o correo" required>
                
                <input type="password" class="input-field" placeholder="Contraseña" required>
                
                <button type="submit" class="btn btn-login">Iniciar sesión</button>
                
                <button type="button" class="btn btn-register">No tienes una cuenta? Registrate</button>
            </form>
            
            <div class="dohcode">DohCode</div>
        </div>
    </div>
</body>
</html>
