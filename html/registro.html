<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DataGaucha - Registro</title>

<link rel="stylesheet" href="../css/registro.css"></head>
<body>
<header class="top-bar">
<span class="circle"></span>
<span class="square"></span>
<span class="triangle"></span>
<span class="top-line"></span>
</header>
<main class="register-page">
<h1 class="title">
      Crea tu cuenta en DataGaucha para ver y crear todo el contenido que quieras
    </h1>
<form class="form-container">
<input class="input-field" placeholder="Nombre completo" type="text"/>
<input class="input-field" placeholder="Tu nombre de usuario" type="text"/>
<input class="input-field" placeholder="Contraseña" type="password"/>
<input class="input-field" placeholder="Repetir contraseña" type="password"/>
<input class="input-field" placeholder="Mail" type="email"/>
<p class="birth-label">Fecha de nacimiento</p>
<div class="birth-row">
<input class="birth-input" placeholder="Dia" type="text"/>
<input class="birth-input" placeholder="Mes" type="text"/>
<input class="birth-input" placeholder="Año" type="text"/>
</div>
<label class="checkbox-row">
<input type="checkbox"/>
<span>Acepto terminos y condiciones de uso</span>
</label>
<label class="checkbox-row">
<input type="checkbox"/>
<span>Soy mayor de 18 años</span>
</label>
<div class="buttons">
<button class="btn btn-register" type="submit">Registrarse</button>
<button class="btn btn-cancel" type="button">Cancelar</button>
</div>
</form>
</main>
</body>
</html>
