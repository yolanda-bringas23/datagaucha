<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <title>DataGaucha - Registro</title>
</head>

<body style="font-family: 'Roboto Mono', monospace;">
  <main class="register">
    <h1 class="page-title">
      Crea tu cuenta de DataGaucha para ver y crear todo el contenido que quieras
    </h1>

    <form class="registration">
      <input class="input-field" type="text" placeholder="nombre">
      <br>
      <input class="input-field" type="text" placeholder="usuario">
      <br>
      <input class="input-field" type="password" placeholder="contraseña">
      <br>
      <input class="input-field" type="password" placeholder="repita contraseña">
      <br>
      <input class="input-field" type="email" placeholder="email">

      <p class="birth-date-label">Fecha de Nacimiento</p>

      <div class="birth-date">
        <input class="birth-date-input" type="text" placeholder="dia">
        <br>
        <input class="birth-date-input" type="text" placeholder="mes">
        <br>
        <input class="birth-date-input" type="text" placeholder="año">
        <br>
      </div>

      <label class="checkbox1">
        <input type="checkbox">
        <span>Acepto los términos y condiciones de uso</span>
      </label>

      <label class="checkbox2">
        <input type="checkbox">
        <span>Tengo más de 18 años</span>
      </label>

      <div class="button1">
        <button type="submit" class="button register-button">Registrarse</button>
        <button type="button" class="button cancel-button">Cancelar</button>
      </div>
    </form>
  </main>
</body>
</html>
