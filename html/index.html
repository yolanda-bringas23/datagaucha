<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataGaucha - Login</title>

  <style>
    :root {
      --air-force-blue: #50849D;
      --black: #000000;
      --silver: #ADACA9;
      --platinum: #EEF0F2;
      --dark-bg: #4f4f4f;
      --green: #10b753;
      --blue-btn: #38b6ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: var(--platinum);
    }

    .top-bar {
      height: 30px;
      background-color: #f8dc5b;
      border-bottom: 2px solid black;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
    }

    .circle {
      width: 10px;
      height: 10px;
      background-color: #4458c9;
      border-radius: 50%;
    }

    .square {
      width: 10px;
      height: 10px;
      background-color: #4458c9;
    }

    .triangle {
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 11px solid #4458c9;
    }

    .top-line {
      flex: 1;
      height: 4px;
      background-color: #ff718f;
      border-radius: 10px;
      margin-left: 15px;
    }

    .container {
      min-height: calc(100vh - 30px);
      display: grid;
      grid-template-columns: 55% 45%;
    }

    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--platinum);
      padding: 20px;
    }

    .logo-section img {
      max-width: 80%;
    }

    .login-section {
      background-color: var(--dark-bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 300px;
      text-align: center;
    }

    .login-box h2 {
      color: black;
      font-size: 14px;
      margin-bottom: 10px;
      text-align: left;
    }

    .form-control {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: 20px;
      background-color: var(--platinum);
      text-align: center;
      margin-bottom: 10px;
      outline: none;
    }

    .btn-login {
      width: 70%;
      height: 35px;
      border-radius: 20px;
      border: none;
      background-color: var(--green);
      color: white;
      font-weight: bold;
      margin: 15px 0;
      cursor: pointer;
    }

    .btn-register {
      width: 100%;
      height: 30px;
      border-radius: 20px;
      border: none;
      background-color: var(--blue-btn);
      cursor: pointer;
    }

    .brand {
      margin-top: 10px;
      color: black;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>

  <div class="top-bar">
    <div class="circle"></div>
    <div class="square"></div>
    <div class="triangle"></div>
    <div class="top-line"></div>
  </div>

  <div class="container">

    <div class="logo-section">
      <!-- 👉 PONÉ TU IMAGEN ACÁ -->
      <img src="logo.png" alt="DataGaucha">
    </div>

    <div class="login-section">
      <div class="login-box">

        <h2>Iniciar sesión en DataGaucha</h2>

        <input type="text" class="form-control" placeholder="Nombre de usuario o correo">
        <input type="password" class="form-control" placeholder="Contraseña">

        <button class="btn-login">Iniciar sesión</button>

        <button class="btn-register">
          No tienes una cuenta? Registrate
        </button>

        <div class="brand">DohCode</div>

      </div>
    </div>

  </div>

</body>
</html>
