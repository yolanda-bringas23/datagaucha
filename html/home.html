<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataGaucha - Home</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="../css/home.css">
</head>

<body>

  <div class="top-bar">
    <div class="circle"></div>
    <div class="square"></div>
    <div class="triangle"></div>
    <div class="line"></div>
  </div>

  <div class="nav">

    <div class="menu-container">
      <button class="menu-button" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="dropdown-menu">
        <button type="button">Mi perfil</button>
        <button type="button">Mis publicaciones</button>
        <button type="button">Configuración</button>
        <button type="button">Cerrar sesión</button>
      </div>
    </div>

    <input class="search" placeholder="Buscar...">

    <div class="avatar"></div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-item"><div class="dot"></div><div class="line-item"></div></div>
      <div class="sidebar-item"><div class="dot"></div><div class="line-item"></div></div>
      <div class="sidebar-item"><div class="dot"></div><div class="line-item"></div></div>
      <div class="sidebar-item"><div class="dot"></div><div class="line-item"></div></div>
      <div class="footer">DohCode - 2026</div>
    </aside>

    <main class="main">
      <div class="content">

        <button class="btn-post">Crear publicación</button>

        <div class="post">
          <div class="user">
            <div class="user-icon"></div>
            <span>Usuario</span>
          </div>

          <div class="title">Título</div>
          <div class="desc">Historia...</div>

          <div class="image-box">
            <span>🖼️</span>
          </div>

          <div class="more">Ver más...</div>

          <div class="actions">
            <span>♡</span>
            <span>💬</span>
            <span>😊</span>
          </div>
        </div>

      </div>
    </main>
  </div>

</body>
</html>
