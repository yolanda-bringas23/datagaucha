<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataGaucha - Home</title>

  <style>
    :root {
      --blue: #50849D;
      --black: #000;
      --silver: #ADACA9;
      --bg: #e6e6e6;
      --yellow: #f8dc5b;
      --pink: #ff718f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: var(--bg);
    }

    .top-bar {
      height: 30px;
      background: var(--yellow);
      display: flex;
      align-items: center;
      padding: 0 15px;
      gap: 10px;
      border-bottom: 2px solid black;
    }

    .circle, .square {
      width: 10px;
      height: 10px;
      background: #4458c9;
    }

    .circle { border-radius: 50%; }

    .triangle {
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 11px solid #4458c9;
    }

    .line {
      flex: 1;
      height: 4px;
      background: var(--pink);
      border-radius: 20px;
      margin-left: 10px;
    }

    .nav {
      height: 60px;
      background: #bfbfbf;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
    }

    .menu-container {
      position: relative;
    }

    .menu-button {
      width: 35px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }

    .menu-button span {
      width: 35px;
      height: 3px;
      background: var(--blue);
      display: block;
      border-radius: 10px;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: 42px;
      left: 0;
      width: 190px;
      background: var(--platinum, #EEF0F2);
      border: 1px solid var(--black);
      border-radius: 8px;
      padding: 10px;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,.25);
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-menu button {
      width: 100%;
      height: 34px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      background: var(--blue);
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-align: left;
      padding-left: 12px;
    }

    .dropdown-menu button:last-child {
      margin-bottom: 0;
    }

    .dropdown-menu button:hover {
      filter: brightness(0.9);
    }

    .search {
      width: 300px;
      height: 35px;
      border-radius: 10px;
      border: 1px solid #888;
      text-align: center;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: black;
    }

    .layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 90px);
    }

    .sidebar {
      background: #bfbfbf;
      padding: 20px;
      position: relative;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--blue);
    }

    .line-item {
      height: 2px;
      flex: 1;
      background: var(--blue);
    }

    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 12px;
    }

    .main {
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .content {
      width: 400px;
      text-align: center;
    }

    .btn-post {
      background: var(--blue);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      margin-bottom: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .post {
      text-align: left;
    }

    .user {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .user-icon {
      width: 20px;
      height: 20px;
      background: black;
      border-radius: 50%;
    }

    .title {
      background: var(--silver);
      padding: 5px;
    }

    .desc {
      background: #cfcfcf;
      padding: 5px;
      font-size: 14px;
    }

    .image-box {
      height: 220px;
      background: var(--silver);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid black;
      margin-top: 5px;
    }

    .image-box span {
      font-size: 40px;
      color: var(--blue);
    }

    .more {
      text-align: right;
      font-size: 12px;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 15px;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <div class="top-bar">
    <div class="circle"></div>
    <div class="square"></div>
    <div class="triangle"></div>
    <div class="line"></div>
  </div>

  <div class="nav">

    <div class="menu-container">
      <button class="menu-button" id="menuButton" type="button">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="dropdown-menu" id="dropdownMenu">
        <button type="button">Mi perfil</button>
        <button type="button">Mis publicaciones</button>
        <button type="button">Configuración</button>
        <button type="button">Cerrar sesión</button>
      </div>
    </div>

    <input class="search" placeholder="Buscar...">

    <div class="avatar"></div>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-item">
        <div class="dot"></div>
        <div class="line-item"></div>
      </div>

      <div class="sidebar-item">
        <div class="dot"></div>
        <div class="line-item"></div>
      </div>

      <div class="sidebar-item">
        <div class="dot"></div>
        <div class="line-item"></div>
      </div>

      <div class="sidebar-item">
        <div class="dot"></div>
        <div class="line-item"></div>
      </div>

      <div class="footer">DohCode - 2026</div>
    </aside>

    <main class="main">
      <div class="content">

        <button class="btn-post">Crear publicación</button>

        <div class="post">

          <div class="user">
            <div class="user-icon"></div>
            <span>Usuario</span>
          </div>

          <div class="title">Título</div>
          <div class="desc">Historia...</div>

          <div class="image-box">
            <span>🖼️</span>
          </div>

          <div class="more">Ver más...</div>

          <div class="actions">
            <span>♡</span>
            <span>💬</span>
            <span>😊</span>
          </div>

        </div>

      </div>
    </main>

  </div>

  <script>
    const menuButton = document.getElementById("menuButton");
    const dropdownMenu = document.getElementById("dropdownMenu");

    menuButton.addEventListener("click", function () {
      dropdownMenu.classList.toggle("show");
    });

    document.addEventListener("click", function (event) {
      const clickDentroDelMenu = menuButton.contains(event.target) || dropdownMenu.contains(event.target);

      if (!clickDentroDelMenu) {
        dropdownMenu.classList.remove("show");
      }
    });
  </script>

</body>
</html>
