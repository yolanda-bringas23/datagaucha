<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="red social, publicaciones, DohCode, Data Gaucha, comunidad">
    <meta name="description" content="Inicio de Data Gaucha, la red social de DohCode. Explorá publicaciones, reaccioná con likes y comentarios, y compartí tus propias experiencias.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="16x16" href="../img/favicon-16x16.png">
    <link rel="stylesheet" href="css/styles.css">
    <title>Inicio | Data Gaucha</title>
</head>
<body>
    <div class="grid">
        <nav id="nav">
            <button class="btn-menu" type="button">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul>
                <li><a href="html/busqueda.html">Busqueda</a></li>
                <li><a href="html/comentarios.html">Comentarios</a></li>
                <li><a href="html/perfil.html">Perfil</a></li>
                <li><a href="html/condiciones-de-uso.html?back_uri=index.html">Condiciones de Uso</a></li>
                <li><a href="html/loguear.html">Cerrar Sesión</a></li>
            </ul>
            <p class="p-index">© DohCode 2026</p>
        </nav>


        <header id="header">
            <form class="search-form" action="">
                <div class="input-group">
                    <button class="btn-submit" type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                    <input type="text" class="form-control" placeholder="Buscar...">
                    <button class="btn-reset" type="reset">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </form>
            <a href="html/perfil.html" class="btn-profile" type="button">
                    <i class="fa-solid fa-circle-user user-btn"></i>
                    <span class="text-profile"></span>
            </a>
        </header>


        <section id="section">
            <h1 class="visually-hidden">Publicaciones de Data Gaucha</h1>
            <button type="button" class="btn btn-primary btn-crear" data-bs-toggle="modal" data-bs-target="#exampleModal">
                Crear Publicación
            </button>


            <article class="publication-card">
                <button class="btn-user" type="button">
                    <i class="fa-solid fa-circle-user user-btn"></i>
                    <p class="p-index">Nombre de usuario</p>
                </button>
                <h2>Mi día</h2>
                <p class="p-index">Hoy tuve un buen día con mi familia</p>
                <img class="image-publication" src="img/image.jpg" alt="Publicación de usuario: foto del día en familia">
                <div class="btn-group-actions">
                    <button type="button"><i class="fa-solid fa-heart btn-like"></i></button>
                    <button type="button"><i class="fa-solid fa-comment btn-comment"></i></button>
                    <button type="button"><i class="fa-solid fa-face-smile btn-share"></i></button>
                </div>
            </article>
        </section>
    </div>


    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">


                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Crear Publicación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>


                <div class="modal-body">
                    <form action="" method="post" enctype="multipart/form-data">
                        <h2>Título de la Publicación</h2>
                        <input type="text" name="title" placeholder="Escribe un título atractivo..." required class="form-control mb-3">


                        <h2>Contenido</h2>
                        <textarea name="content" placeholder="Escribe el contenido de la publicación aquí..." required class="form-control mb-3"></textarea>


                        <h2>Imagen de la publicación (opcional)</h2>
                        <input type="file" name="image" class="form-control mb-3">


                        <div class="modal-footer">
                            <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-success">Aceptar</button>
                        </div>
                    </form>
                </div>


            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
